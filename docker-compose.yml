version: '3.8'

services:
  backend:
    build: .
    container_name: chat-backend
    expose:
      - "8000"
   # entrypoint: []
   # command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]  # overriding the ip to communicate between containers
    restart: always

  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    ports:
      - "80:80"
    volumes:
      # TODO: Candidates need to map the frontend directory correctly to serve the HTML
      - ./frontend:/usr/share/nginx/html:ro # we have to mount the frontend, so we have to uncomment this
     # - ./nginx.conf:/etc/nginx/nginx.conf:ro  ( this is main root config, but we have to mount default config)
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always